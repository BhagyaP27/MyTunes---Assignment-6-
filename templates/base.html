<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}MyTunes+{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <header>
    <div class="nav-wrap">
      <div class="brand"><a href="{{ url_for('index') }}">MyTunes+</a></div>
      <nav>
        <a href="{{ url_for('artists') }}">Artists</a>
        <a href="{{ url_for('playlists') }}">Playlists</a>
        <a href="{{ url_for('genres') }}">Genres</a>
      </nav>
    </div>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
  <footer>
    <p>COMP 3005 project demo app · SQLite + Flask interface · MyTunes+ personal music collection database.</p>
  </footer>
</body>
</html>
